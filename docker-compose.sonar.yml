# ============================================================================
# SonarQube — análisis de calidad y cobertura para los servicios Java.
#
# Uso:
#   1. Levantar Sonar:   docker compose -f docker-compose.sonar.yml up -d
#   2. Abrir http://localhost:9000  (admin/admin, te pedirá cambiar la clave)
#   3. Crear un token:   My Account > Security > Generate Token
#   4. Analizar un servicio (ejemplo order-service), reutilizando la caché .m2:
#
#      MSYS_NO_PATHCONV=1 docker run --rm \
#        -v "C:/proyecto-book-plus/book-plus-order-service:/app" \
#        -v bookplus-m2:/root/.m2 -w /app \
#        --network proyecto-book-plus_bookplus-net \
#        maven:3.9-eclipse-temurin-21 \
#        mvn clean test sonar:sonar \
#          -Dsonar.host.url=http://sonarqube:9000 \
#          -Dsonar.token=TU_TOKEN
#
#   (Si tu red de compose tiene otro nombre, míralo con `docker network ls`.)
# ============================================================================

services:
  sonarqube:
    image: sonarqube:10-community
    container_name: bookplus-sonarqube
    depends_on:
      - sonar-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    # SonarQube embebe Elasticsearch; necesita un límite de mmap alto.
    # En Linux/WSL2: sudo sysctl -w vm.max_map_count=262144
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  sonar-db:
    image: postgres:16-alpine
    container_name: bookplus-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db_data:/var/lib/postgresql/data

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_db_data:
