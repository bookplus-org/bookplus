#cloud-config
# Se ejecuta una sola vez al primer arranque de la instancia.
# Instala Docker + el plugin Compose y Tailscale (acceso privado).
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg

runcmd:
  # Docker (repositorio oficial)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu
  - systemctl enable --now docker
  # Tailscale (VPN privada) — autenticar luego con `sudo tailscale up`
  - curl -fsSL https://tailscale.com/install.sh | sh
  - mkdir -p /opt/bookplus

write_files:
  - path: /opt/bookplus/README.txt
    content: |
      Despliegue de BookPlus
      ----------------------
      1. Copia docker-compose.deploy.yml y tu .env a /opt/bookplus
      2. docker login ghcr.io   (token de GitHub Container Registry)
      3. cd /opt/bookplus && docker compose -f docker-compose.deploy.yml up -d
      Acceso privado: sudo tailscale up
