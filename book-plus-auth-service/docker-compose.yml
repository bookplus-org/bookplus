services:

  # ── PostgreSQL — auth_db ─────────────────────────────────────────────────
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB:       auth_db
      POSTGRES_USER:     bookplus
      POSTGRES_PASSWORD: bookplus123
    ports:
      - "5433:5432"           # 5433 en host para no colisionar con otras instancias
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookplus -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookplus-network

  # ── Redis — blacklist & sessions ────────────────────────────────────────
  auth-redis:
    image: redis:7-alpine
    container_name: auth-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"           # 6380 en host
    volumes:
      - auth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bookplus-network

  # ── Kafka (KRaft — sin Zookeeper) ────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - bookplus-network

  # ── Kafka UI — ver topics y mensajes desde el navegador ─────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bookplus-network

  # ── MailHog — servidor SMTP local para emails ────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI para ver emails
    networks:
      - bookplus-network

  # ── Auth Service ─────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST:     auth-postgres
      DB_PORT:     5432
      DB_NAME:     auth_db
      DB_USER:     bookplus
      DB_PASS:     bookplus123
      REDIS_HOST:  auth-redis
      REDIS_PORT:  6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_HOST:   mailhog
      MAIL_PORT:   1025
      FRONTEND_URL: http://localhost:4200
      # JWT keys — vacío = genera ephemeral keys para desarrollo
      APP_SECURITY_JWT_PRIVATE_KEY: ""
      APP_SECURITY_JWT_PUBLIC_KEY:  ""
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bookplus-network
    restart: unless-stopped

volumes:
  auth_postgres_data:
  auth_redis_data:
  kafka_data:

networks:
  bookplus-network:
    name: bookplus-network
    driver: bridge
