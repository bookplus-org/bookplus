version: "3.9"

services:

  cart-redis:
    image: redis:7.2-alpine
    container_name: cart-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6382:6379"
    volumes:
      - cart-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    container_name: cart-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9092:9092"
    volumes:
      - cart-kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart-service
    environment:
      SERVER_PORT:                   8084
      CART_REDIS_HOST:               cart-redis
      CART_REDIS_PORT:               6379
      KAFKA_BOOTSTRAP_SERVERS:       kafka:9092
      CART_JWT_PUBLIC_KEY_BASE64:    ${CART_JWT_PUBLIC_KEY_BASE64}
      CART_REDIS_TTL_DAYS:           30
    ports:
      - "8084:8084"
    depends_on:
      cart-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

volumes:
  cart-redis-data:
  cart-kafka-data:
