# Target mínimo para el escaneo DAST (OWASP ZAP) en CI: el API Gateway (borde) + su Redis.
# El gateway aplica las cabeceras de seguridad y el rate limiting, que es justo lo que interesa
# escanear en el borde. No necesita Kafka ni los servicios backend para arrancar.
#   docker compose -f docker-compose.dast.yml up -d --build
services:
  gateway-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-gateway:
    build: ./book-plus-api-gateway
    environment:
      SERVER_PORT: 8080
      GATEWAY_REDIS_HOST: gateway-redis
      GATEWAY_REDIS_PORT: 6379
      SPRING_CLOUD_GATEWAY_FILTER_REQUEST_RATE_LIMITER_DENY_EMPTY_KEY: "false"
      GATEWAY_JWT_PUBLIC_KEY_BASE64: ${BOOKPLUS_JWT_PUBLIC_KEY_BASE64}
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "0"   # sin trazas durante el escaneo
      # Sin backends: las rutas devuelven error, pero ZAP escanea el borde (cabeceras, TLS, fugas).
    ports:
      - "8080:8080"
    depends_on:
      gateway-redis:
        condition: service_healthy
