# Levanta un Jenkins local YA CONFIGURADO por código (JCasC): sin asistente, con la Shared
# Library, SonarCloud, Vault, Slack y el job multibranch listos.
#   docker compose -p bookplus-jenkins -f docker-compose.jenkins.yml up -d --build
# Jenkins en http://localhost:8080  (usuario: admin / contraseña: la de JENKINS_ADMIN_PASSWORD)
#
# Define los secretos en un .env junto a este fichero (o expórtalos):
#   JENKINS_ADMIN_PASSWORD, GHCR_USER, GHCR_TOKEN, SONAR_TOKEN, VAULT_ROLE_ID, VAULT_SECRET_ID
services:
  jenkins:
    build: ./jenkins
    container_name: bookplus-jenkins
    user: root                         # para usar el socket de Docker del host
    dns:                               # DNS fijo: evita los "Could not resolve host" recurrentes
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
      CASC_JENKINS_CONFIG: "/casc/jenkins.yaml"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD:-admin}"
      GHCR_USER: "${GHCR_USER:-}"
      GHCR_TOKEN: "${GHCR_TOKEN:-}"
      SONAR_TOKEN: "${SONAR_TOKEN:-}"
      GITHUB_APP_ID: "${GITHUB_APP_ID:-000000}"
      GITHUB_APP_OWNER: "${GITHUB_APP_OWNER:-bookplus-org}"
      VAULT_ROLE_ID: "${VAULT_ROLE_ID:-}"
      VAULT_SECRET_ID: "${VAULT_SECRET_ID:-}"
    volumes:
      - ./jenkins/casc:/casc:ro
      # Key de la GitHub App. Por defecto monta el dummy (.example) para que JCasC arranque;
      # define GITHUB_APP_KEY_FILE en el .env con la ruta a tu .pem REAL (que vive FUERA del repo).
      - "${GITHUB_APP_KEY_FILE:-./jenkins/casc/github-app.pem.example}:/run/secrets/github-app.pem:ro"
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:
