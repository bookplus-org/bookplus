version: "3.9"

services:

  admin-bff:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: admin-bff
    environment:
      SERVER_PORT:                    8089
      ADMIN_BFF_JWT_PUBLIC_KEY_BASE64: ${BOOKPLUS_JWT_PUBLIC_KEY_BASE64}
      CATALOG_SERVICE_URL:      ${CATALOG_SERVICE_URL:-http://host.docker.internal:8082}
      INVENTORY_SERVICE_URL:    ${INVENTORY_SERVICE_URL:-http://host.docker.internal:8083}
      ORDER_SERVICE_URL:        ${ORDER_SERVICE_URL:-http://host.docker.internal:8085}
      PAYMENT_SERVICE_URL:      ${PAYMENT_SERVICE_URL:-http://host.docker.internal:8086}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://host.docker.internal:8087}
      REPORT_SERVICE_URL:       ${REPORT_SERVICE_URL:-http://host.docker.internal:8088}
      AUTH_SERVICE_URL:         ${AUTH_SERVICE_URL:-http://host.docker.internal:8081}
    ports:
      - "8089:8089"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 5
