server:
  port: 8085
  shutdown: graceful

spring:
  application:
    name: order-service

  # ── Multipart (foto + firma de prueba de entrega) ──────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  # ── Database ───────────────────────────────────────────────────────────
  datasource:
    url:      ${ORDER_DB_URL:jdbc:postgresql://localhost:5436/order_db}
    username: ${ORDER_DB_USER:order_user}
    password: ${ORDER_DB_PASS:order_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Kafka ──────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  # ── Security ───────────────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ""

# ── Order-specific ─────────────────────────────────────────────────────
order:
  jwt:
    public-key-base64: ${ORDER_JWT_PUBLIC_KEY_BASE64}
  outbox:
    poll-ms: ${ORDER_OUTBOX_POLL_MS:5000}   # how often the OutboxRelay polls for PENDING events

# ── Actuator + Tracing ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

# ── Logging — traceId in every line ────────────────────────────────────
logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] [%X{traceId:-},%-4.4X{spanId:-}] %-5level %logger{30} - %msg%n"
  level:
    com.bookplus.order: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.hibernate.SQL: WARN
