server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: api-gateway

  # ── Codec limits (allow PDF multipart uploads to pass through) ──────────
  codec:
    max-in-memory-size: 25MB

  # ── Redis for Rate Limiting ────────────────────────────────────────────
  data:
    redis:
      host: ${GATEWAY_REDIS_HOST:localhost}
      port: ${GATEWAY_REDIS_PORT:6383}
      timeout: 2000ms

  # ── Cloud Gateway Routes ───────────────────────────────────────────────
  cloud:
    gateway:
      default-filters:
        # Strip the first path segment when forwarding (handled per route below)
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      routes:

        # ── auth-service (port 8081) ──────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── catalog-service (port 8082) ───────────────────────────────────
        - id: catalog-service-books
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/books/**, /api/v1/categories/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1

        # ── biblioteca / favoritos (catalog-service, requiere auth) ───────
        - id: catalog-library
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/library/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1

        - id: catalog-favorites
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/favorites/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1

        # ── inventory-service (port 8083) ─────────────────────────────────
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── cart-service (port 8084) ──────────────────────────────────────
        - id: cart-service
          uri: ${CART_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1

        # ── order-service (port 8085) ─────────────────────────────────────
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── payment-service (port 8086) ───────────────────────────────────
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── notification-service (port 8087) ──────────────────────────────
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── report-service (port 8088) ────────────────────────────────────
        - id: report-service
          uri: ${REPORT_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/reports/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── catalog admin writes (must precede the admin-bff catch-all) ───
        - id: catalog-admin
          uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/admin/books/**, /api/v1/admin/categories/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── auth admin: user management (must precede the admin-bff catch-all) ─
        - id: auth-admin-users
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/admin/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

        # ── admin-bff (port 8089) ─────────────────────────────────────────
        - id: admin-bff
          uri: ${ADMIN_BFF_URL:http://localhost:8089}
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ""

# ── Gateway-specific ───────────────────────────────────────────────────
gateway:
  jwt:
    public-key-base64: ${GATEWAY_JWT_PUBLIC_KEY_BASE64}
  cors:
    # Comma-separated origin patterns. Default: Angular dev server.
    # In production set CORS_ALLOWED_ORIGINS=https://app.bookplus.com
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Actuator ───────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      enabled: true

# ── Logging ────────────────────────────────────────────────────────────
logging:
  level:
    com.bookplus.gateway: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
