# Prometheus — configuración de scraping para BookPlus.
# Cada microservicio expone sus métricas en /actuator/prometheus (Micrometer).
# Los nombres de host son los nombres de servicio de docker-compose (red bookplus-net).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Reglas de alerta como codigo (versionadas en el repo).
rule_files:
  - /etc/prometheus/alert-rules.yml

# Prometheus evalua las reglas y envia las alertas que disparan a Alertmanager,
# que las agrupa, deduplica y (en produccion) las enruta a email/Slack/PagerDuty.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: bookplus-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "api-gateway:8080"
          - "auth-service:8081"
          - "catalog-service:8082"
          - "inventory-service:8083"
          - "cart-service:8084"
          - "order-service:8085"
          - "payment-service:8086"
          - "notification-service:8087"
          - "report-service:8088"
        labels:
          stack: bookplus
